<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" width="1920" height="1216">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif; }
    .title { fill: #111827; font-size: 22px; font-weight: 700; }
    .subtitle { fill: #6b7280; font-size: 12px; }
    .lane-label { fill: #374151; font-size: 11px; font-weight: 700; letter-spacing: 0.05em; }
    .node-title { fill: #111827; font-size: 14px; font-weight: 700; }
    .node-sub { fill: #6b7280; font-size: 11px; }
    .small { fill: #6b7280; font-size: 10px; }
    .label { fill: #374151; font-size: 11px; font-weight: 600; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#111827" flood-opacity="0.12"/>
    </filter>
