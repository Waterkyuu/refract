  <rect width="1200" height="760" fill="#ffffff"/>
  <text x="40" y="38" class="title">Refract Agent Orchestration Architecture</text>
  <text x="40" y="58" class="subtitle">Pipeline mode coordinates planning, data work, charting, report generation, Typst compilation, repair, and learned memory.</text>

  <rect x="32" y="78" width="1136" height="104" rx="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.2" stroke-dasharray="6,4"/>
