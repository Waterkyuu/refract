  <text x="123" y="151" text-anchor="middle" class="node-sub">user messages</text>

  <polygon points="302,104 366,139 302,174 238,139" fill="#ffffff" stroke="#93c5fd" stroke-width="2" filter="url(#soft-shadow)"/>
